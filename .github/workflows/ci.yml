name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/app.txt
          pip install pytest ruff
      - name: Lint
        run: ruff check src/ --select E,F --ignore E501 || true
      - name: Run fast tests
        run: pytest tests/ -v -m "not slow" -k "adapter or api or scorecard or citation or composition or consensus or verifier or state or reader"