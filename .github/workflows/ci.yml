name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        env:
          RPY2_CFFI_MODE: ABI
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/app.txt
          pip install scanpy anndata scikit-learn
          pip install pytest ruff
      - name: Lint
        run: ruff check src/ --select E,F --ignore E501 || true
      - name: Run environment-independent tests
        run: |
          pytest tests/ -v -m "not slow" \
            --ignore=tests/agents \
            --ignore=tests/orchestrator \
            --ignore=tests/pipeline