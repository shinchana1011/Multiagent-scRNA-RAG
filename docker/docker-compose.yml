# docker/docker-compose.yml — full stack (Member 4, Task 8)
version: "3.9"
services:
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports: ["8000:8000"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    depends_on: [ollama]
    volumes:
      - ../runs:/app/runs
      - ../data:/app/data

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m streamlit run src/ui/app.py --server.address 0.0.0.0 --server.port 8501
    ports: ["8501:8501"]
    environment:
      - API_BASE_URL=http://api:8000
    depends_on: [api]
    volumes:
      - ../runs:/app/runs
      - ../data:/app/data

volumes:
  ollama_data: